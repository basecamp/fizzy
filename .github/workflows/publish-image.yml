name: Build and publish container image to GHCR

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_DESCRIPTION: Fizzy is Kanban as it should be. Not as it has been.
  SOURCE_URL: https://github.com/${{ github.repository }}

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    outputs:
      canonical: ${{ steps.vars.outputs.canonical }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Compute canonical image name and release tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${IMAGE_NAME:-$GITHUB_REPOSITORY}"
          canonical_image="${REGISTRY}/${image_ref,,}"
          echo "canonical=${canonical_image}" >> "$GITHUB_OUTPUT"
          echo "short_sha=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push image (amd64)
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          build-args: |
            OCI_SOURCE=${{ env.SOURCE_URL }}
            OCI_DESCRIPTION=${{ env.IMAGE_DESCRIPTION }}
          platforms: linux/amd64
          push: true
          tags: ${{ needs.prepare.outputs.canonical }}:${{ needs.prepare.outputs.short_sha }}-amd64
          labels: |
            org.opencontainers.image.source=${{ env.SOURCE_URL }}
            org.opencontainers.image.revision=${{ github.sha }}
            service=fizzy
          sbom: false
          provenance: false

      - name: Attest image provenance (amd64)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ needs.prepare.outputs.canonical }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: false

  manifest:
    name: Create release tag
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release tag
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ needs.prepare.outputs.canonical }}:${{ needs.prepare.outputs.short_sha }}" \
            "${{ needs.prepare.outputs.canonical }}:${{ needs.prepare.outputs.short_sha }}-amd64"

  deploy:
    name: Handoff to Kamal deploy
    needs:
      - prepare
      - manifest
    uses: ./.github/workflows/deploy-self-hosted.yml
    with:
      action: deploy
      version: ${{ needs.prepare.outputs.short_sha }}
    secrets: inherit
