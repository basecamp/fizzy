name: Sync Gemfile.saas.lock

on:
  push:
    branches:
      - "dependabot/bundler/**"
    paths:
      - Gemfile.lock

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.2 # zizmor: ignore[artipacked] -- credentials needed for git push

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: .ruby-version

      - name: Forward Gemfile.lock changes to Gemfile.saas.lock
        run: bin/bundle-drift forward

      - name: Commit updated lockfile
        run: |
          git add Gemfile.saas.lock
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Sync Gemfile.saas.lock"
            git push
          fi
