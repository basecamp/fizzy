name: Sync Gemfile.saas.lock

on:
  push:
    branches:
      - "dependabot/bundler/**"
    paths:
      - Gemfile.lock

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2 # zizmor: ignore[artipacked] -- credentials needed for git push

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: .ruby-version

      - name: Forward Gemfile.lock changes to Gemfile.saas.lock
        run: bin/bundle-drift forward

      - name: Commit updated lockfile
        run: |
          git add Gemfile.saas.lock
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Sync Gemfile.saas.lock"
            git push
          fi
