name: Deploy self-hosted Fizzy

on:
  workflow_dispatch:
    inputs:
      action:
        description: Kamal action to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - setup

concurrency:
  group: deploy-self-hosted-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - arm64
      - pi5-01
      - kamal
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    env:
      KAMAL_IMAGE: ghcr.io/basecamp/kamal:v2.10.1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Write deploy secrets to local files
        shell: bash
        env:
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          set -euo pipefail

          mkdir -p config

          {
            printf 'SECRET_KEY_BASE=%s\n' "$SECRET_KEY_BASE"
            printf 'VAPID_PUBLIC_KEY=%s\n' "$VAPID_PUBLIC_KEY"
            printf 'VAPID_PRIVATE_KEY=%s\n' "$VAPID_PRIVATE_KEY"
            printf 'SMTP_USERNAME=%s\n' "$SMTP_USERNAME"
            printf 'SMTP_PASSWORD=%s\n' "$SMTP_PASSWORD"
            printf 'S3_ACCESS_KEY_ID=%s\n' "$S3_ACCESS_KEY_ID"
            printf 'S3_SECRET_ACCESS_KEY=%s\n' "$S3_SECRET_ACCESS_KEY"
            printf 'CLOUDFLARED_TOKEN=%s\n' "$CLOUDFLARED_TOKEN"
          } > .env.kamal.local

          chmod 600 .env.kamal.local

          if [ -n "${RAILS_MASTER_KEY:-}" ]; then
            printf '%s' "$RAILS_MASTER_KEY" > config/master.key
            chmod 600 config/master.key
          else
            rm -f config/master.key
          fi

      - name: Verify runner can SSH to homelab-rcc
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes homelab-rcc "echo runner-ssh-ok >/dev/null"

      - name: Log in to GHCR
        shell: bash
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$KAMAL_REGISTRY_PASSWORD" | docker login ghcr.io -u joshyorko --password-stdin

      - name: Wait for published image tag
        shell: bash
        run: |
          set -euo pipefail

          image_ref="ghcr.io/joshyorko/fizzy:sha-${GITHUB_SHA::7}"

          for attempt in $(seq 1 60); do
            if docker manifest inspect "$image_ref" >/dev/null 2>&1; then
              echo "Found $image_ref"
              exit 0
            fi

            echo "Waiting for $image_ref to appear in GHCR (attempt ${attempt}/60)"
            sleep 15
          done

          echo "Timed out waiting for $image_ref" >&2
          exit 1

      - name: Pull official Kamal image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$KAMAL_IMAGE"

      - name: Run Kamal from official container
        shell: bash
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          action="${{ github.event.inputs.action || 'deploy' }}"
          version="sha-${GITHUB_SHA::7}"
          docker run --rm \
            --pull never \
            --entrypoint /bin/sh \
            -v "$PWD:/workspace" \
            -v "$HOME/.ssh:/root/.ssh:ro" \
            -v "$HOME/.docker:/root/.docker:ro" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /workspace \
            -e KAMAL_REGISTRY_PASSWORD \
            -e ACTION="$action" \
            -e VERSION="$version" \
            "$KAMAL_IMAGE" -lc '
              set -euo pipefail

              if [ "$ACTION" = "setup" ]; then
                /kamal/bin/kamal setup --skip-push --version "$VERSION"
              else
                /kamal/bin/kamal deploy --skip-push --version "$VERSION"
              fi
            '
