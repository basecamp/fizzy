name: Deploy self-hosted Fizzy

on:
  push:
    branches:
      - self-hosted
  workflow_dispatch:
    inputs:
      action:
        description: Kamal action to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - setup

concurrency:
  group: deploy-self-hosted-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - arm64
      - pi5-01
      - kamal
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Write deploy secrets to local files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p config

          {
            printf 'SECRET_KEY_BASE=%s\n' '${{ secrets.SECRET_KEY_BASE }}'
            printf 'VAPID_PUBLIC_KEY=%s\n' '${{ secrets.VAPID_PUBLIC_KEY }}'
            printf 'VAPID_PRIVATE_KEY=%s\n' '${{ secrets.VAPID_PRIVATE_KEY }}'
            printf 'SMTP_USERNAME=%s\n' '${{ secrets.SMTP_USERNAME }}'
            printf 'SMTP_PASSWORD=%s\n' '${{ secrets.SMTP_PASSWORD }}'
            printf 'S3_ACCESS_KEY_ID=%s\n' '${{ secrets.S3_ACCESS_KEY_ID }}'
            printf 'S3_SECRET_ACCESS_KEY=%s\n' '${{ secrets.S3_SECRET_ACCESS_KEY }}'
            printf 'CLOUDFLARED_TOKEN=%s\n' '${{ secrets.CLOUDFLARED_TOKEN }}'
          } > .env.kamal.local

          printf '%s' '${{ secrets.RAILS_MASTER_KEY }}' > config/master.key
          chmod 600 .env.kamal.local config/master.key

      - name: Verify runner can SSH to homelab-rcc
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes homelab-rcc "echo runner-ssh-ok >/dev/null"

      - name: Log in to GHCR
        shell: bash
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$KAMAL_REGISTRY_PASSWORD" | docker login ghcr.io -u joshyorko --password-stdin

      - name: Wait for published image tag
        shell: bash
        run: |
          set -euo pipefail

          image_ref="ghcr.io/joshyorko/fizzy:sha-${GITHUB_SHA::7}"

          for attempt in $(seq 1 60); do
            if docker manifest inspect "$image_ref" >/dev/null 2>&1; then
              echo "Found $image_ref"
              exit 0
            fi

            echo "Waiting for $image_ref to appear in GHCR (attempt ${attempt}/60)"
            sleep 15
          done

          echo "Timed out waiting for $image_ref" >&2
          exit 1

      - name: Run Kamal from published image
        shell: bash
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          action="${{ github.event.inputs.action || 'deploy' }}"
          version="sha-${GITHUB_SHA::7}"

          if [ "$action" = "setup" ]; then
            bin/kamal setup --skip-push --version "$version"
          else
            bin/kamal deploy --skip-push --version "$version"
          fi
