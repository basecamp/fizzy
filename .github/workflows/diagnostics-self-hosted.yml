name: Diagnose self-hosted Fizzy

on:
  workflow_dispatch:
    inputs:
      command:
        description: Kamal diagnostic command set to run
        required: true
        default: summary
        type: choice
        options:
          - summary
          - app_logs
          - proxy_logs
          - app_details
          - proxy_details
          - audit
      lines:
        description: Number of log lines for log commands
        required: true
        default: "200"
        type: string

concurrency:
  group: diagnostics-self-hosted-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on:
      - self-hosted
      - linux
      - arm64
      - pi5-01
      - kamal
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      KAMAL_IMAGE: ghcr.io/basecamp/kamal:v2.10.1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Write deploy secrets to local files
        shell: bash
        env:
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          set -euo pipefail

          mkdir -p config

          {
            printf 'SECRET_KEY_BASE=%s\n' "$SECRET_KEY_BASE"
            printf 'VAPID_PUBLIC_KEY=%s\n' "$VAPID_PUBLIC_KEY"
            printf 'VAPID_PRIVATE_KEY=%s\n' "$VAPID_PRIVATE_KEY"
            printf 'SMTP_USERNAME=%s\n' "$SMTP_USERNAME"
            printf 'SMTP_PASSWORD=%s\n' "$SMTP_PASSWORD"
            printf 'S3_ACCESS_KEY_ID=%s\n' "$S3_ACCESS_KEY_ID"
            printf 'S3_SECRET_ACCESS_KEY=%s\n' "$S3_SECRET_ACCESS_KEY"
            printf 'CLOUDFLARED_TOKEN=%s\n' "$CLOUDFLARED_TOKEN"
          } > .env.kamal.local

          chmod 600 .env.kamal.local

          if [ -n "${RAILS_MASTER_KEY:-}" ]; then
            printf '%s' "$RAILS_MASTER_KEY" > config/master.key
            chmod 600 config/master.key
          else
            rm -f config/master.key
          fi

      - name: Verify runner can SSH to homelab-rcc
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes homelab-rcc "echo runner-ssh-ok >/dev/null"

      - name: Pull official Kamal image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$KAMAL_IMAGE"

      - name: Run Kamal diagnostics
        shell: bash
        env:
          COMMAND: ${{ github.event.inputs.command || 'summary' }}
          LINES: ${{ github.event.inputs.lines || '200' }}
        run: |
          set -euo pipefail

          docker run --rm \
            --pull never \
            --entrypoint /bin/sh \
            -v "$PWD:/workspace" \
            -v "$HOME/.ssh:/root/.ssh:ro" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w /workspace \
            -e COMMAND \
            -e LINES \
            "$KAMAL_IMAGE" -lc '
              set -euo pipefail

              fail=0
              run_check() {
                echo
                echo "==> $*"
                if ! "$@"; then
                  fail=1
                fi
              }

              case "$COMMAND" in
                summary)
                  run_check /kamal/bin/kamal version
                  run_check /kamal/bin/kamal details
                  run_check /kamal/bin/kamal app version
                  run_check /kamal/bin/kamal app containers
                  run_check /kamal/bin/kamal proxy details
                  ;;
                app_logs)
                  run_check /kamal/bin/kamal app logs --primary --lines "$LINES"
                  ;;
                proxy_logs)
                  run_check /kamal/bin/kamal proxy logs --primary --lines "$LINES"
                  ;;
                app_details)
                  run_check /kamal/bin/kamal app details
                  ;;
                proxy_details)
                  run_check /kamal/bin/kamal proxy details
                  ;;
                audit)
                  run_check /kamal/bin/kamal audit
                  ;;
                *)
                  echo "Unsupported diagnostics command: $COMMAND" >&2
                  exit 64
                  ;;
              esac

              exit "$fail"
            '
