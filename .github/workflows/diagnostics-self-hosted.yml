name: Diagnose self-hosted Fizzy

on:
  workflow_dispatch:
    inputs:
      command:
        description: Kamal diagnostic command set to run
        required: true
        default: summary
        type: choice
        options:
          - summary
          - app_logs
          - proxy_logs
          - app_details
          - proxy_details
          - audit
      lines:
        description: Number of log lines for log commands
        required: true
        default: "200"
        type: string

concurrency:
  group: diagnostics-self-hosted-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ${{ fromJSON(vars.SELF_HOSTED_RUNNER_LABELS_JSON || '["self-hosted"]') }}
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby on runner
        shell: bash
        run: |
          set -euo pipefail
          runner_home="$(getent passwd "$(id -un)" | cut -d: -f6)"
          export RBENV_ROOT="${RBENV_ROOT:-$runner_home/.rbenv}"
          export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/shims:$PATH"
          eval "$(rbenv init - bash)"
          ruby -v
          if ! bundle _2.6.9_ -v >/dev/null 2>&1; then
            gem install bundler -v 2.6.9 --no-document
          fi
          bundle -v

      - name: Configure persistent Bundler path
        shell: bash
        run: |
          set -euo pipefail
          runner_home="$(getent passwd "$(id -un)" | cut -d: -f6)"
          bundle_path="$runner_home/.local/share/bundle/fizzy"
          bundle_app_config="$runner_home/.config/bundle/fizzy"
          mkdir -p "$bundle_path" "$bundle_app_config"
          {
            printf 'BUNDLE_PATH=%s\n' "$bundle_path"
            printf 'BUNDLE_APP_CONFIG=%s\n' "$bundle_app_config"
          } >> "$GITHUB_ENV"

      - name: Install bundle
        shell: bash
        run: |
          set -euo pipefail
          runner_home="$(getent passwd "$(id -un)" | cut -d: -f6)"
          export RBENV_ROOT="${RBENV_ROOT:-$runner_home/.rbenv}"
          export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/shims:$PATH"
          eval "$(rbenv init - bash)"
          bundle check || bundle install --jobs 4 --retry 3

      - name: Write deploy secrets to local files
        shell: bash
        env:
          KAMAL_SERVER_ALIAS: ${{ vars.KAMAL_SERVER_ALIAS }}
          KAMAL_PUBLIC_HOST: ${{ vars.KAMAL_PUBLIC_HOST }}
          KAMAL_SSH_USER: ${{ vars.KAMAL_SSH_USER }}
          KAMAL_STORAGE_PATH: ${{ vars.KAMAL_STORAGE_PATH }}
          KAMAL_MAILER_FROM_ADDRESS: ${{ vars.KAMAL_MAILER_FROM_ADDRESS }}
          KAMAL_KNOWN_HOST: ${{ vars.KAMAL_KNOWN_HOST }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          set -euo pipefail

          mkdir -p config

          {
            printf 'KAMAL_SERVER_ALIAS=%s\n' "$KAMAL_SERVER_ALIAS"
            printf 'KAMAL_PUBLIC_HOST=%s\n' "$KAMAL_PUBLIC_HOST"
            printf 'KAMAL_SSH_USER=%s\n' "$KAMAL_SSH_USER"
            printf 'KAMAL_STORAGE_PATH=%s\n' "$KAMAL_STORAGE_PATH"
            printf 'KAMAL_MAILER_FROM_ADDRESS=%s\n' "$KAMAL_MAILER_FROM_ADDRESS"
            printf 'KAMAL_KNOWN_HOST=%s\n' "$KAMAL_KNOWN_HOST"
            printf 'S3_ENDPOINT=%s\n' "$S3_ENDPOINT"
            printf 'S3_BUCKET=%s\n' "$S3_BUCKET"
            printf 'SECRET_KEY_BASE=%s\n' "$SECRET_KEY_BASE"
            printf 'VAPID_PUBLIC_KEY=%s\n' "$VAPID_PUBLIC_KEY"
            printf 'VAPID_PRIVATE_KEY=%s\n' "$VAPID_PRIVATE_KEY"
            printf 'SMTP_USERNAME=%s\n' "$SMTP_USERNAME"
            printf 'SMTP_PASSWORD=%s\n' "$SMTP_PASSWORD"
            printf 'S3_ACCESS_KEY_ID=%s\n' "$S3_ACCESS_KEY_ID"
            printf 'S3_SECRET_ACCESS_KEY=%s\n' "$S3_SECRET_ACCESS_KEY"
            printf 'CLOUDFLARED_TOKEN=%s\n' "$CLOUDFLARED_TOKEN"
          } > .env.kamal.local

          chmod 600 .env.kamal.local

          if [ -n "${RAILS_MASTER_KEY:-}" ]; then
            printf '%s' "$RAILS_MASTER_KEY" > config/master.key
            chmod 600 config/master.key
          else
            rm -f config/master.key
          fi

      - name: Verify runner can SSH to homelab-rcc
        shell: bash
        env:
          KAMAL_SERVER_ALIAS: ${{ vars.KAMAL_SERVER_ALIAS }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes "$KAMAL_SERVER_ALIAS" "echo runner-ssh-ok >/dev/null"

      - name: Prepare runner SSH state
        shell: bash
        env:
          KAMAL_KNOWN_HOST: ${{ vars.KAMAL_KNOWN_HOST }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh-keygen -R "$KAMAL_KNOWN_HOST" -f "$HOME/.ssh/known_hosts" >/dev/null 2>&1 || true
          ssh-keyscan "$KAMAL_KNOWN_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run Kamal diagnostics on runner
        shell: bash
        env:
          COMMAND: ${{ github.event.inputs.command || 'summary' }}
          LINES: ${{ github.event.inputs.lines || '200' }}
        run: |
          set -euo pipefail
          runner_home="$(getent passwd "$(id -un)" | cut -d: -f6)"
          export RBENV_ROOT="${RBENV_ROOT:-$runner_home/.rbenv}"
          export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/shims:$PATH"
          eval "$(rbenv init - bash)"

          kamal_cmd() {
            bundle exec kamal "$@"
          }

          fail=0
          run_check() {
            echo
            echo "==> $*"
            if ! "$@"; then
              fail=1
            fi
          }

          case "$COMMAND" in
            summary)
              run_check bundle exec kamal version
              run_check kamal_cmd details
              run_check kamal_cmd app version
              run_check kamal_cmd app containers
              run_check kamal_cmd proxy details
              ;;
            app_logs)
              run_check kamal_cmd app logs --primary --lines "$LINES"
              ;;
            proxy_logs)
              run_check kamal_cmd proxy logs --primary --lines "$LINES"
              ;;
            app_details)
              run_check kamal_cmd app details
              ;;
            proxy_details)
              run_check kamal_cmd proxy details
              ;;
            audit)
              run_check kamal_cmd audit
              ;;
            *)
              echo "Unsupported diagnostics command: $COMMAND" >&2
              exit 64
              ;;
          esac

          exit "$fail"
