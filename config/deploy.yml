# Name of this app
service: fizzy
image: joshyorko/fizzy


#-- About your deployment --#

# Where to deploy fizzy
servers:
  web:
    - homelab-rcc

# How you connect to your server
ssh:
  user: kdlocpanda

# Cloudflare Tunnel handles public TLS; Kamal proxy serves local origin HTTP
proxy:
  host: fizzy.joshyorko.com
  app_port: 80
  ssl_redirect: true
  forward_headers: true
  ssl: false
  run:
    bind_ips:
      - 127.0.0.1

# Your application configuration (secrets come from .kamal/secrets).
env:
  secret:
    - SECRET_KEY_BASE
    - VAPID_PUBLIC_KEY
    - VAPID_PRIVATE_KEY
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - AWS_ACCESS_KEY_ID:S3_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY:S3_SECRET_ACCESS_KEY
  clear:
    BASE_URL: https://fizzy.joshyorko.com
    ASSUME_SSL: true
    FORCE_SSL: true
    MAILER_FROM_ADDRESS: joshua.yorko@gmail.com
    SMTP_ADDRESS: smtp.gmail.com
    MULTI_TENANT: false # Set to true to allow multiple accounts to sign up
    SOLID_QUEUE_IN_PUMA: true # Run background jobs in the app container
    ACTIVE_STORAGE_SERVICE: mirror_s3
    S3_ENDPOINT: http://10.10.40.56:9000
    S3_REGION: us-east-1
    S3_FORCE_PATH_STYLE: true
    S3_BUCKET: fizzy-production
    AWS_REGION: us-east-1


accessories:
  cloudflared:
    image: cloudflare/cloudflared:latest
    host: homelab-rcc
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN:CLOUDFLARED_TOKEN


#-- General configuration --#

registry:
  server: ghcr.io
  username:
    - joshyorko
  password:
    - KAMAL_REGISTRY_PASSWORD

# Handy aliases for interacting with your deployment. For eaxmple: `bin/kamal console` will connect to a
# Rails console in production.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent host path for sqlite database files and local Active Storage files.
volumes:
  - "/home/kdlocpanda/fizzy-data/storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Keep builder config available for manual fallback deploys.
builder:
  arch: amd64
